<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İletişim — Dizdar Architects</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="page-inner">

  <header id="header" class="scrolled">
    <div class="header-inner">
      <a href="index.html" class="logo"><img src="images/logo-black.png" alt="Dizdar Architects" /></a>
      <div style="display:flex;align-items:center;gap:36px;">
        <nav id="nav">
          <a href="projeler.html">Projeler</a>
          <a href="profil.html">Profil</a>
          <a href="iletisim.html" class="active">İletişim</a>
        </nav>
        <button class="burger" id="burger" aria-label="Menü"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" id="mobileClose">&#10005;</button>
    <nav>
      <a href="projeler.html" class="mobile-link">Projeler</a>
      <a href="profil.html"   class="mobile-link">Profil</a>
      <a href="iletisim.html" class="mobile-link">İletişim</a>
    </nav>
  </div>

  <div class="contact-page contact-single">

    <!-- Bilgiler + form -->
    <div class="contact-info-side fade-in">

      <h1>İletişim</h1>
      <div class="contact-divider"></div>

      <div class="contact-block">
        <div class="contact-block-item">
          <label>Telefon</label>
          <a href="tel:+905385847399">+90 538 584 73 99</a><br>
          <a href="tel:+994515377453">+994 51 537 74 53</a>
        </div>
        <div class="contact-block-item">
          <label>E-posta</label>
          <a href="mailto:dizdar.architects@gmail.com">dizdar.architects@gmail.com</a>
        </div>
      </div>

      <!-- İletişim formu -->
      <div class="contact-form-wrap">
        <h2>Bir projeniz mi var?</h2>
        <form id="contactForm">
          <div class="form-grid">
            <div class="form-row">
              <label for="name">Ad Soyad</label>
              <input type="text" id="name" name="name" placeholder="Adınız" required />
            </div>
            <div class="form-row">
              <label for="email">E-posta</label>
              <input type="email" id="email" name="email" placeholder="ornek@email.com" required />
            </div>
            <div class="form-row full">
              <label for="subject">Proje Türü</label>
              <select id="subject" name="subject">
                <option value="">Seçin</option>
                <option>Konut</option>
                <option>Ticari</option>
                <option>İç Mekan</option>
                <option>Diğer</option>
              </select>
            </div>
            <div class="form-row full">
              <label for="message">Mesaj</label>
              <textarea id="message" name="message" rows="5" placeholder="Projenizi kısaca anlatın..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-send">Gönder</button>
              <div class="form-success" id="formSuccess">
                Mesajınız alındı — en kısa sürede dönüş yapacağız.
              </div>
            </div>
          </div>
        </form>
      </div>

      <div class="contact-social">
        <a href="https://www.instagram.com/dizdararchitects?igsh=bWluOHBtcW84azdx" target="_blank" rel="noopener">Instagram</a>
      </div>

    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <a href="index.html" class="logo"><img src="images/logo-black.png" alt="Dizdar Architects" /></a>
      <p>© 2025 Dizdar Architects</p>
      <div class="footer-nav">
        <a href="projeler.html">Projeler</a>
        <a href="profil.html">Profil</a>
        <a href="iletisim.html">İletişim</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
