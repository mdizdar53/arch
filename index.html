<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dizdar Architects — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* Arka plan fotoğrafı */
    .bg {
      position: fixed;
      inset: 0;
      background: url('images/a.jpg') center/cover no-repeat;
      filter: grayscale(100%);
      z-index: 0;
    }

    /* Koyu overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.52);
      z-index: 1;
    }

    /* Tüm içerik */
    .page {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 36px 48px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .logo {
      color: #fff;
      text-decoration: none;
      line-height: 1.25;
    }
    .logo .l1 {
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      display: block;
    }
    .logo .l1 strong { font-weight: 500; }
    .logo .l2 {
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      display: block;
    }

    nav {
      display: flex;
      gap: 40px;
      padding-top: 6px;
    }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.25s;
    }
    nav a:hover { color: #fff; }

    /* ── ORTA İÇERİK ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }

    .coming-soon {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: #fff;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 36px;
    }

    /* İnce yatay çizgi */
    .divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.45);
      margin: 0 auto 32px;
    }

    .subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.7);
      line-height: 1.9;
      margin-bottom: 40px;
    }

    .btn-stay {
      display: inline-block;
      padding: 14px 52px;
      border: 1px solid rgba(255,255,255,0.65);
      color: #fff;
      text-decoration: none;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s;
    }
    .btn-stay:hover {
      background: rgba(255,255,255,0.12);
      border-color: #fff;
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .tagline {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    .socials {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .socials a {
      color: rgba(255,255,255,0.7);
      transition: color 0.25s;
      display: flex;
      align-items: center;
    }
    .socials a:hover { color: #fff; }
    .socials svg { width: 18px; height: 18px; fill: currentColor; }

    /* Mobil */
    @media (max-width: 600px) {
      .page { padding: 24px 24px; }
      nav { gap: 20px; }
      .coming-soon { letter-spacing: 0.15em; margin-bottom: 24px; }
      .divider { height: 32px; margin-bottom: 20px; }
      .tagline { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="page">

    <!-- Header -->
    <header>
      <a href="index.html" class="logo">
        <span class="l1"><strong>Dizdar</strong></span>
        <span class="l2">Architect</span>
      </a>
      <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html">Projects</a>
        <a href="profil.html">About</a>
        <a href="iletisim.html">Contact</a>
      </nav>
    </header>

    <!-- Orta -->
    <div class="center">
      <h1 class="coming-soon">Coming Soon</h1>
      <div class="divider"></div>
      <p class="subtitle">
        We are building something extraordinary.<br>
        Our new website is on its way.
      </p>
      <a href="iletisim.html" class="btn-stay">Stay Tuned</a>
    </div>

    <!-- Footer -->
    <footer>
      <div class="tagline">
        Inspiring<br>Better Living.

        </a>
      </div>
    </footer>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
