<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dızdar Architects — Comıng Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    /* Slideshow */
    .bg-slide {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.4s ease-in-out;
    }
    .bg-slide.active { opacity: 1; }

    /* Koyu overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.52);
      z-index: 1;
    }

    /* Tüm içerik */
    .page {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 36px 48px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .logo {
      color: #fff;
      text-decoration: none;
      line-height: 1.25;
    }
    .logo .l1 {
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      display: block;
    }
    .logo .l1 strong { font-weight: 500; }
    .logo .l2 {
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      display: block;
    }

    nav {
      display: flex;
      gap: 40px;
      padding-top: 6px;
    }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.25s;
    }
    nav a:hover { color: #fff; }

    /* ── ORTA İÇERİK ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }

    .coming-soon {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 200;
      letter-spacing: 0.35em;
      color: #fff;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 36px;
    }

    /* İnce yatay çizgi */
    .divider {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.45);
      margin: 0 auto 32px;
    }

    .subtitle {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.7);
      line-height: 1.9;
      margin-bottom: 40px;
    }

    .btn-stay {
      display: inline-block;
      padding: 14px 52px;
      border: 1px solid rgba(255,255,255,0.65);
      color: #fff;
      text-decoration: none;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s;
    }
    .btn-stay:hover {
      background: rgba(255,255,255,0.12);
      border-color: #fff;
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .tagline {
      position: fixed;
      bottom: 36px;
      left: 48px;
      z-index: 3;
    }

    .socials {
      position: fixed;
      bottom: 36px;
      right: 48px;
      z-index: 3;
    }

    .tagline {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    .socials {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .socials a {
      color: rgba(255,255,255,0.7);
      transition: color 0.25s;
      display: flex;
      align-items: center;
    }
    .socials a:hover { color: #fff; }
    .socials svg { width: 18px; height: 18px; fill: currentColor; }

    /* Tablet */
    @media (max-width: 768px) {
      .page { padding: 28px 28px; }
      nav { gap: 24px; }
      .coming-soon { font-size: clamp(2.4rem, 10vw, 5rem); letter-spacing: 0.18em; margin-bottom: 24px; }
      .divider { height: 36px; margin-bottom: 22px; }
      .subtitle { font-size: 0.72rem; margin-bottom: 32px; }
    }

    /* Mobil */
    @media (max-width: 480px) {
      .page { padding: 24px 20px; }
      nav { gap: 16px; }
      nav a { font-size: 0.55rem; letter-spacing: 0.16em; }
      .coming-soon { font-size: clamp(2rem, 12vw, 3.5rem); letter-spacing: 0.12em; margin-bottom: 20px; }
      .divider { height: 28px; margin-bottom: 18px; }
      .subtitle { font-size: 0.68rem; line-height: 1.8; margin-bottom: 28px; }
      .btn-stay { padding: 13px 36px; font-size: 0.55rem; letter-spacing: 0.28em; }
      .tagline { display: none; }
      .logo img { height: 32px; }
    }
  </style>
</head>
<body>

  <div class="bg-slide active" style="background-image:url('images/enver-bey-ayakkabi/cover.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/insta-enver/cover.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/ramiz-bey/cover.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/renderlar/cover.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/cerrahi-klinika/cover.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/inklab-cafe/cover.jpg')"></div>
  <div class="bg-slide" style="background-image:url('images/samet-gur/cover.jpg')"></div>
  <div class="overlay"></div>

  <div class="page">

    <!-- Header -->
    <header>
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Dizdar Architects" style="height:42px;" />
      </a>
      <nav>
        <a href="index.html">Home</a>
        <a href="projeler.html">Projects</a>
        <a href="profil.html">About</a>
        <a href="iletisim.html">Contact</a>
      </nav>
    </header>

    <!-- Footer -->
    <footer>
      <div class="tagline">
        Inspırıng<br>Better Lıvıng.
      </div>
      <div class="socials">
        <!-- Instagram -->
        <a href="https://www.instagram.com/dizdararchitects?igsh=bWluOHBtcW84azdx" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
          </svg>
        </a>
      </div>
    </footer>

  </div>

  <script>
    const slides = document.querySelectorAll('.bg-slide');
    let current = 0;
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 5000);
  </script>
  <script src="js/main.js"></script>
</body>
</html>
